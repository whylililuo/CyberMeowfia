name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: false

    - name: Diagnose and Compile IonStack
      run: |
        ROOT_DIR=$(pwd)
        
        echo "========================================="
        echo "【诊断】深度扫描 IonStack 目录结构："
        echo "========================================="
        cd IonStack
        ls -R
        echo "========================================="
        
        # 开始循环处理子目录
        for dir in */; do
          dirname=${dir%/}
          echo "👉 正在处理子目录: $dirname"
          
          cd "$dirname"
          
          echo "--- 正在尝试强行编译 $dirname ---"
          # 放弃严格的 if 判断，直接强行注入环境变量进行 Go 编译
          # 即使编译失败，Go 会把缺什么文件、什么语法的报错直接吐在日志里
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o "$ROOT_DIR/android_${dirname}" 2>&1 || echo "❌ 强行构建失败"
          
          cd ..
        done
        
        # 写入兜底状态文件
        echo "Debug build pipeline finished at $(date)" > "$ROOT_DIR/android_build_status.txt"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        path: |
          android_*
