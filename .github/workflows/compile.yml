name: Build IonStack Android Binary

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Compile IonStack Binaries
      run: |
        cd IonStack
        
        # 1. 定义交叉编译器路径（API 29 对应 Android 10+）
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        # 创建一个统一存放编译输出文件的目录
        mkdir -p output_bins
        
        # 2. 循环遍历当前目录下的所有子目录（如 CVE-2026-10702 等）
        for dir in */; do
          # 去掉目录名末尾的斜杠 /
          dirname=${dir%/}
          
          # 排除我们刚刚创建的输出目录
          if [ "$dirname" = "output_bins" ]; then
            continue
          fi
          
          echo "========================================="
          echo "正在处理目录: $dirname"
          echo "========================================="
          
          cd "$dirname"
          
          # 检查子目录下是否有 .c 文件
          if ls *.c 1> /dev/null 2>&1; then
            echo "发现源码，开始编译..."
            # 编译该目录下所有 .c 文件，输出为以目录名为名字的二进制文件
            $CC *.c -o "../output_bins/${dirname}_bin" -pie -fPIE
            echo "编译成功 -> output_bins/${dirname}_bin"
          else
            echo "未在 $dirname 中找到 .c 源码文件，跳过。"
          fi
          
          # 返回上级 IonStack 目录
          cd ..
        done

    # 3. 上传编译好的所有二进制文件
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IonStack-Android-Binaries
        # 只需要上传我们统一收集的 output_bins 目录即可
        path: IonStack/output_bins/
