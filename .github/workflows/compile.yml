name: Build IonStack Android Binary

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 编译 IonStack
    - name: Compile IonStack Binary
      run: |
        cd IonStack
        
        # 直接使用 GitHub Ubuntu 环境中自带的 Android NDK 路径
        # ANDROID_NDK_LATEST_HOME 是 GitHub 官方预设的环境变量
        echo "使用系统内置 NDK 路径: $ANDROID_NDK_LATEST_HOME"
        
        # 设置交叉编译器路径（针对 arm64-v8a 架构，API 29 对应安卓 10+）
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        echo "检查 IonStack 目录结构..."
        ls -la
        
        # 编译策略
        if [ -f "Makefile" ] || [ -f "makefile" ]; then
          echo "检测到 Makefile，使用 make 编译..."
          make CC=$CC
        elif [ -f "Android.mk" ]; then
          echo "检测到 Android.mk，使用 ndk-build 编译..."
          $ANDROID_NDK_LATEST_HOME/ndk-build
        else
          echo "未检测到构建脚本，直接调用 Clang 编译所有 .c 文件..."
          $CC *.c -o ionstack_bin -pie -fPIE
        fi

    # 3. 上传编译成果物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IonStack-Android-Binaries
        path: |
          IonStack/ionstack_bin
          IonStack/libs/
          IonStack/obj/
