name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 用 sed 强行修改源码文本，彻底绕过头文件冲突
    - name: Compile C Exploits
      run: |
        ROOT_DIR=$(pwd)
        echo "项目根目录: $ROOT_DIR"
        
        # 设定 NDK 工具链路径
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        # -------------------------------------------------------------
        # 编译任务一：编译 CVE-2026-43499 的独立 poc.c
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/poc" ]; then
          echo "👉 开始处理 CVE-2026-43499 Poc..."
          cd IonStack/CVE-2026-43499/poc
          
          # 【核心修复】：直接用 sed 修改代码文件，把 struct sched_attr 改名为 my_custom_sched_attr
          # 这样在代码层面就和 NDK 系统的全局结构体完全错开了
          sed -i 's/struct sched_attr/struct my_custom_sched_attr/g' poc.c
          
          echo "开始执行编译..."
          $CC poc.c -o "$ROOT_DIR/android_CVE-2026-43499_poc" -pie -fPIE -lm
          
          echo "✅ Poc 编译成功并移至根目录。"
          cd $ROOT_DIR
        fi

        # -------------------------------------------------------------
        # 编译任务二：利用 Makefile 编译 CVE-2026-43499 的完整 exploit
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/exploit" ]; then
          echo "👉 开始处理 CVE-2026-43499 完整 Exploit..."
          cd IonStack/CVE-2026-43499/exploit
          
          # 【核心修复】：同样对 exploit 目录下的所有源文件和头文件进行结构体强行更名
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/struct sched_attr/struct my_custom_sched_attr/g' 2>/dev/null || true
          
          echo "开始执行 make..."
          make CC="$CC"
          
          # 将成功生成的、具有执行权限的二进制程序收集到根目录
          find . -maxdepth 2 -type f -executable -not -name "*.sh" -not -name "*.py" -exec cp {} "$ROOT_DIR/android_CVE-2026-43499_exploit" \;
          
          echo "✅ Exploit 编译完成并尝试移至根目录。"
          cd $ROOT_DIR
        fi

        # 写入状态文件
        echo "C pipeline fully fixed and completed via sed at $(date)" > "$ROOT_DIR/android_build_status.txt"

    # 3. 在根目录打包上传
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        path: |
          android_*
