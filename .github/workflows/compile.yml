name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 调用 NDK 编译器和 Make 进行精准编译
    - name: Compile C Exploits
      run: |
        ROOT_DIR=$(pwd)
        echo "项目根目录: $ROOT_DIR"
        
        # 设定 NDK 工具链路径（针对 arm64-v8a 架构，安卓 10+）
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        # -------------------------------------------------------------
        # 编译任务一：编译 CVE-2026-43499 的独立 poc.c
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/poc" ]; then
          echo "👉 开始编译 CVE-2026-43499 Poc..."
          cd IonStack/CVE-2026-43499/poc
          $CC poc.c -o "$ROOT_DIR/android_CVE-2026-43499_poc" -pie -fPIE -lm
          echo "✅ Poc 编译成功并移至根目录。"
          cd $ROOT_DIR
        fi

        # -------------------------------------------------------------
        # 编译任务二：利用 Makefile 编译 CVE-2026-43499 的完整 exploit
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/exploit" ]; then
          echo "👉 开始编译 CVE-2026-43499 完整 Exploit..."
          cd IonStack/CVE-2026-43499/exploit
          
          # 传入 NDK 的 Clang 编译器替换系统默认的 gcc 执行 make
          make CC=$CC
          
          # 检查编译出来的可执行文件名（一般 Makefile 编译出的成品在当前目录或 bin/，我们把生成的成果找出来）
          # 这里为了确保稳妥，把当前目录下生成的新可执行文件全部抓取过来
          find . -maxdepth 2 -type f -executable -not -name "*.sh" -exec cp {} "$ROOT_DIR/android_CVE-2026-43499_exploit" \;
          
          echo "✅ Exploit 编译完成并尝试移至根目录。"
          cd $ROOT_DIR
        fi

        # 强制写入兜底报告
        echo "C pipeline finished at $(date)" > "$ROOT_DIR/android_build_status.txt"

    # 3. 在根目录打包上传
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        path: |
          android_*
