name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码到根目录
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 编译环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 3. 执行编译并强制输出到根目录
    - name: Compile IonStack with Go
      run: |
        # 获取当前项目的绝对根目录路径
        ROOT_DIR=$(pwd)
        echo "项目绝对根目录是: $ROOT_DIR"
        
        cd IonStack
        
        for dir in */; do
          dirname=${dir%/}
          
          echo "========================================="
          echo "正在编译模块: $dirname"
          echo "========================================="
          
          cd "$dirname"
          
          # 检查 Go 源码
          if [ -f "go.mod" ] || ls *.go 1> /dev/null 2>&1; then
            echo "开始跨平台编译为 Android (arm64)..."
            
            # 【核心修改】：输出路径直接锁定到 $ROOT_DIR/android_${dirname}
            CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o "$ROOT_DIR/android_${dirname}"
            
            echo "✅ 成功生成并移至根目录 -> android_${dirname}"
          else
            # 兼容少许 C 语言的情况（双保险）
            if ls *.c 1> /dev/null 2>&1; then
               export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
               CGO_ENABLED=1 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o "$ROOT_DIR/android_${dirname}"
               echo "✅ CGO 编译成功并移至根目录 -> android_${dirname}"
            else
               echo "❌ 该目录不含有效的源码，跳过。"
            fi
          fi
          
          cd ..
        done
        
        # 在根目录生成一个编译状态报告，确保即使没有编译出任何东西，根目录下也有新文件可供打包
        echo "Build finished at $(date)" > "$ROOT_DIR/android_build_status.txt"

    # 4. 直接在根目录打包上传
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        # 【核心修改】：通过通配符前缀，只上传根目录下我们刚刚生成的安卓二进制文件
        path: |
          android_*
