name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 精准解决头文件冲突并进行安卓编译
    - name: Compile C Exploits
      run: |
        ROOT_DIR=$(pwd)
        echo "项目根目录: $ROOT_DIR"
        
        # 设定 NDK 工具链路径（针对 arm64-v8a 架构，安卓 10+）
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        # -------------------------------------------------------------
        # 编译任务一：编译 CVE-2026-43499 的独立 poc.c (已修复结构体冲突)
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/poc" ]; then
          echo "👉 开始编译 CVE-2026-43499 Poc..."
          cd IonStack/CVE-2026-43499/poc
          
          # 【核心修复】：注入 -D"sched_attr=local_sched_attr" 重命名冲突结构体，强制通过编译
          $CC poc.c -o "$ROOT_DIR/android_CVE-2026-43499_poc" -D"sched_attr=local_sched_attr" -pie -fPIE -lm
          
          echo "✅ Poc 编译成功并移至根目录。"
          cd $ROOT_DIR
        fi

        # -------------------------------------------------------------
        # 编译任务二：利用 Makefile 编译 CVE-2026-43499 的完整 exploit
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/exploit" ]; then
          echo "👉 开始编译 CVE-2026-43499 完整 Exploit..."
          cd IonStack/CVE-2026-43499/exploit
          
          # 如果 exploit 的源码里也存在同样的冲突，我们在调用 make 时同样把修复宏传进去
          make CC="$CC -D\"sched_attr=local_sched_attr\""
          
          # 将成功生成的、具有执行权限的二进制程序收集到根目录
          find . -maxdepth 2 -type f -executable -not -name "*.sh" -not -name "*.py" -exec cp {} "$ROOT_DIR/android_CVE-2026-43499_exploit" \;
          
          echo "✅ Exploit 编译完成并尝试移至根目录。"
          cd $ROOT_DIR
        fi

        # 写入状态文件
        echo "C pipeline fully fixed and completed at $(date)" > "$ROOT_DIR/android_build_status.txt"

    # 3. 打包上传所有以 android_ 开头的文件
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        path: |
          android_*
