name: Build Android Binaries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Enable Debug and Compile C Exploits
      run: |
        ROOT_DIR=$(pwd)
        export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
        
        # 调试注入参数：强行关闭 stdout 缓冲区，实现实时输出
        DEBUG_FLAGS="-D\"main(a,b)=main(int a, char** b){setvbuf(stdout,NULL,_IONBF,0);setvbuf(stderr,NULL,_IONBF,0);local_main(a,b);} int local_main\""

        # -------------------------------------------------------------
        # 处理并编译 CVE-2026-43499 Poc
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/poc" ]; then
          echo "👉 开始处理 CVE-2026-43499 Poc..."
          cd IonStack/CVE-2026-43499/poc
          
          # 1. 基础结构体冲突修复
          sed -i 's/struct sched_attr/struct my_custom_sched_attr/g' poc.c
          
          # 2. 【新增调试修复】强行在代码头部激活可能被关闭的 DEBUG / VERBOSE 打印宏
          sed -i '1i #define DEBUG 1\n#define VERBOSE 1\n#define DEBUG_PRINT 1' poc.c
          
          echo "开始执行编译..."
          $CC poc.c -o "$ROOT_DIR/android_CVE-2026-43499_poc" $DEBUG_FLAGS -pie -fPIE -lm
          
          cd $ROOT_DIR
        fi

        # -------------------------------------------------------------
        # 处理并编译 CVE-2026-43499 完整 Exploit
        # -------------------------------------------------------------
        if [ -d "IonStack/CVE-2026-43499/exploit" ]; then
          echo "👉 开始处理 CVE-2026-43499 完整 Exploit..."
          cd IonStack/CVE-2026-43499/exploit
          
          # 1. 基础结构体冲突修复
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/struct sched_attr/struct my_custom_sched_attr/g' 2>/dev/null || true
          
          # 2. 【新增调试修复】对所有 C 文件头部注入调试开启宏
          find . -type f -name "*.c" -exec sed -i '1i #define DEBUG 1\n#define VERBOSE 1' {} \;
          
          echo "开始执行 make..."
          make CC="$CC $DEBUG_FLAGS"
          
          find . -maxdepth 2 -type f -executable -not -name "*.sh" -not -name "*.py" -exec cp {} "$ROOT_DIR/android_CVE-2026-43499_exploit" \;
          
          cd $ROOT_DIR
        fi

        echo "Debug-enabled pipeline finished at $(date)" > "$ROOT_DIR/android_build_status.txt"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-IonStack-Exploits
        path: |
          android_*
